# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

env:
  package_name: mistletoe

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    # Python 3.5 and 3.6 are not tested here because current hosted runners
    # no longer provide those versions.
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.11.14"
        enable-cache: true
    - name: Install dependencies
      run: |
        uv sync --dev --all-extras --locked --python ${{ matrix.python-version }}
    - name: Lint with flake8
      run: |
        # See https://www.flake8rules.com for the list of the rules.
        # stop the build if there are Python syntax errors or undefined names
        uv run --no-sync flake8 . --count --select=E9,F63,F7,F82,W605 --show-source --statistics
        # exit-zero treats all errors as warnings
        uv run --no-sync flake8 . --count --exit-zero --statistics
    - name: Test with pytest
      id: unit_tests
      run: |
        uv run --no-sync pytest
    - name: Test CommonMark compliance
      if: ${{ success() || steps.unit_tests.conclusion == 'failure' }}
      run: |
        uv run --no-sync python -m test.specification --ignore-known

  coverage:

    needs: build
    runs-on: ubuntu-latest
    env:
      python_version: 3.11

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ env.python_version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.python_version }}
    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.11.14"
        enable-cache: true
    - name: Install dependencies
      run: |
        uv sync --dev --all-extras --locked --python ${{ env.python_version }}
    - name: Get coverage report
      run: |
        uv run --no-sync coverage run --source=${package_name} --append -m pytest
        uv run --no-sync coverage run --source=${package_name} --append -m test.specification --ignore-known
        # quick local report output to console:
        uv run --no-sync coverage report
    - name: Upload report to Coveralls
      # documentation for GitHub setup: https://coveralls-python.readthedocs.io/en/latest/usage/configuration.html#github-actions-support
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        uv run --no-sync coveralls --service=github
